<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星辰 · 盛夏逐光</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0A1628;
  --bg-mid: #0F2444;
  --bg-surface: #152238;
  --bg-card: rgba(255,255,255,.06);
  --bg-card-hover: rgba(255,255,255,.1);
  --text: #F1F5F9;
  --text2: #94A3B8;
  --text3: #64748B;
  --primary: #0284C7;
  --primary-light: #38BDF8;
  --secondary: #06B6D4;
  --accent: #0891B2;
  --border: rgba(255,255,255,.08);
  --border-hover: rgba(255,255,255,.15);
  --ring: rgba(2,132,199,.4);
  --glass-bg: rgba(255,255,255,.06);
  --glass-border: rgba(255,255,255,.08);
  --s-gold: #38BDF8;
  --b-silver: #06B6D4;
  --a-bronze: #0284C7;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 6px rgba(0,0,0,.4);
  --shadow-lg: 0 20px 40px rgba(0,0,0,.5);
  --shadow-blue: 0 8px 32px rgba(2,132,199,.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{
  font-family:'DM Sans','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg-deep);
  color:var(--text);line-height:1.6;min-height:100vh;
  background-attachment:fixed;font-weight:400;
}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary-light)}
/* 全局隐藏数字输入框的上下箭头 */
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.wrap{max-width:1000px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* Wave Divider */
.wave-divider{display:block;width:100%;height:48px;margin:-1px 0}
.wave-divider svg{width:100%;height:100%;display:block}

/* Hero */
.hero{
  text-align:center;padding:72px 0 48px;animation:heroIn .5s ease;
  position:relative;z-index:1;
}
@keyframes heroIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.hero-kicker{
  font-family:'Space Grotesk','PingFang SC',sans-serif;
  font-size:12px;font-weight:500;color:var(--primary-light);
  letter-spacing:.2em;margin-bottom:16px;text-transform:uppercase;
}
.hero h1{
  font-family:'Space Grotesk','PingFang SC',sans-serif;
  font-size:clamp(32px,5vw,44px);font-weight:700;
  background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 40%,var(--primary-light) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;margin-bottom:8px;
}
.hero .subtitle{
  font-size:15px;color:var(--text2);letter-spacing:.04em;margin-top:8px;
}
.hero-deco{
  position:absolute;top:0;right:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(2,132,199,.1),transparent 70%);
  pointer-events:none;z-index:0;
}
/* Aurora background */
.aurora-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 80% at 50% -20%,rgba(2,132,199,.15),transparent),
    radial-gradient(ellipse 50% 50% at 80% 60%,rgba(6,182,212,.08),transparent),
    radial-gradient(ellipse 60% 60% at 20% 80%,rgba(56,189,248,.1),transparent);
}
/* Query Section */
.query-section{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:32px 0;position:relative;z-index:1;
}
.query-card{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:20px;padding:28px 24px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .3s ease;
}
.query-card:hover{
  border-color:var(--border-hover);
  background:var(--bg-card-hover);
  box-shadow:var(--shadow-blue);
}
.query-card .label{
  font-family:'Space Grotesk','PingFang SC',sans-serif;
  font-size:18px;font-weight:600;color:var(--text);
  margin-bottom:16px;
}
.query-row{display:flex;flex-direction:column;align-items:center;gap:10px}
.query-card input,.query-card select{
  width:100%;padding:12px 16px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:12px;font-size:14px;color:var(--text);
  font-family:inherit;outline:none;text-align:center;
  transition:border-color .2s;
  color-scheme:dark;
}
.query-card input:focus,.query-card select:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);
}
.query-card input::placeholder{color:var(--text3)}
.points-box{padding:16px 0;text-align:center}
.points-box .pts-label{font-size:13px;color:var(--text);font-weight:500;display:block}
.pts-score-row{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.pts-score-label{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:.03em}
.points-box .pts-value{
  font-family:'Space Grotesk','PingFang SC',sans-serif;
  font-size:40px;font-weight:700;line-height:1;
}
.points-box .pts-empty{font-size:13px;color:var(--text3)}
.operator-display{
  display:block;padding:12px 16px;min-height:44px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;font-size:14px;color:var(--text);
  box-sizing:border-box;text-align:center;line-height:1.5;
}
.op-label{font-size:12px;color:var(--text3);margin-right:6px}
.op-name{font-size:14px;color:var(--text);font-weight:600}
/* Tier Sections */
.tier-section{margin-bottom:32px}
.tier-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tier-badge{
  padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;
  font-family:'Space Grotesk','PingFang SC',sans-serif;letter-spacing:.03em;
}
.tier-badge.s{background:rgba(56,189,248,.15);color:var(--primary-light);border:1px solid rgba(56,189,248,.3)}
.tier-badge.a{background:rgba(6,182,212,.12);color:var(--secondary);border:1px solid rgba(6,182,212,.3)}
.tier-badge.b{background:rgba(2,132,199,.1);color:var(--primary);border:1px solid rgba(2,132,199,.3)}
.tier-threshold{font-size:12px;color:var(--text2);margin-left:4px}
.tier-header span:last-child{margin-left:auto;font-size:12px;font-weight:600;color:var(--primary)}

/* Gift Grid */
.tier-section{margin-bottom:40px}
.tier-header{
  display:flex;align-items:center;font-size:14px;color:var(--text2);
  margin-bottom:16px;gap:8px;
}
.tier-badge{
  font-family:'Space Grotesk','PingFang SC',sans-serif;
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
  letter-spacing:.04em;
}
.tier-badge.s{background:rgba(56,189,248,.15);color:var(--primary-light)}
.tier-badge.a{background:rgba(6,182,212,.12);color:var(--secondary)}
.tier-badge.b{background:rgba(2,132,199,.1);color:var(--primary)}
.tier-threshold{color:var(--text3);font-size:13px}
.gift-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.gift-card{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:all .25s ease;position:relative;z-index:1;
}
.gift-card:hover{
  border-color:var(--border-hover);
  background:var(--bg-card-hover);
  transform:translateY(-2px);
  box-shadow:var(--shadow-blue);
}
.gift-card.sold-out{opacity:.35;pointer-events:none}
.gift-card .gift-icon{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:rgba(255,255,255,.06);border-radius:12px;flex-shrink:0;
}
.gift-card .gift-body{flex:1;min-width:0}
.gift-card .gift-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gift-card .gift-meta{font-size:12px;color:var(--text3);margin-top:2px}
.gift-card .gift-stock{font-size:12px;color:var(--text3);flex-shrink:0}
.gift-card .gift-stock.low{color:rgba(56,189,248,.7)}
/* Modal */
.modal-mask{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}}
.modal{width:calc(100% - 32px);max-width:380px;background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:var(--shadow-lg);animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.97) translateY(12px);opacity:0}}
.modal h3{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:17px;margin-bottom:4px;font-weight:700;color:var(--text)}
.modal .sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.fields{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.fields input{height:42px;padding:0 14px;background:var(--bg-surface);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border .15s,box-shadow .15s}
.fields input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(0,180,216,.12)}
.fields input::placeholder{color:var(--text3)}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-row input[type=number]{width:64px;text-align:center}
.qty-sum{font-size:12px;color:var(--text2)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Buttons */
.btn{height:44px;padding:0 22px;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s ease;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow-blue)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid rgba(255,255,255,.18)}
.btn-ghost:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-small{height:36px;padding:0 14px;font-size:13px;border-radius:8px}

/* Toast */
.toast-rack{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-msg{padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;pointer-events:auto;backdrop-filter:blur(16px);border:1px solid var(--border)}
.toast-msg.success{background:rgba(2,132,199,.2);color:var(--primary-light);border-color:rgba(2,132,199,.3)}
.toast-msg.error{background:rgba(220,38,38,.15);color:#FCA5A5;border-color:rgba(220,38,38,.25)}

/* Admin Trigger */
.admin-trigger{text-align:center;margin:36px 0 50px}
.admin-trigger button{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s;padding:8px 16px;border-radius:10px}
.admin-trigger button:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.admin-trigger button:hover{color:var(--primary)}

/* Admin Overlay */
.admin-overlay{position:fixed;inset:0;z-index:500;background:var(--bg-surface);overflow-y:auto}
.admin-shell{max-width:800px;margin:0 auto;padding:20px 24px 40px}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.admin-topbar h2{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.admin-tabs{display:flex;gap:4px;margin-bottom:20px}
.admin-tab{padding:7px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:var(--text2);transition:all .12s}
.admin-tab:hover{background:var(--border);color:var(--primary)}
.admin-tab.active{background:var(--primary);color:#fff}
.admin-content{display:none}
.admin-content:not([style*="display:none"]){display:block}
.admin-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:20px;margin-bottom:10px}
.admin-card h3{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.admin-row{display:flex;gap:6px;flex-wrap:wrap;align-items:end;margin-bottom:8px}
.admin-row input{height:36px;padding:0 10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;transition:border .15s}
.admin-row input:focus{border-color:var(--primary-light)}
.admin-row input.wide{width:160px}.admin-row input.mid{width:85px}.admin-row input.tiny{width:55px}.admin-row input.narrow{width:90px}
.admin-list{display:flex;flex-direction:column;gap:3px}
.admin-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;font-size:12px;background:var(--bg-surface);flex-wrap:wrap;gap:6px;color:var(--text)}
.admin-item .meta{color:var(--text3);font-size:11px}
.act-btn{height:26px;padding:0 8px;border:none;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;background:transparent;color:var(--text2);transition:all .12s}
.act-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}

#giftDropdown option.s-tier{color:var(--primary-light);font-weight:700}
#giftDropdown option.b-tier{color:var(--secondary);font-weight:600}
#giftDropdown option.a-tier{color:var(--primary);font-weight:600}
#giftDropdown option.sold-out{color:var(--text3)}

/* Footer */
.site-footer{text-align:center;padding:40px 0 48px;margin-top:20px;position:relative}
.site-footer .footer-title{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.site-footer .footer-sub{font-size:12px;color:var(--text3)}

/* Custom Dialog */
.custom-dialog-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.custom-dialog-box{background:var(--bg-surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px;max-width:380px;width:90%;box-shadow:var(--shadow-lg);text-align:center}
.custom-dialog-msg{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:20px;white-space:pre-line}
.custom-dialog-input{width:100%;padding:10px 14px;margin-bottom:16px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:rgba(255,255,255,.05);outline:none;text-align:center}
.custom-dialog-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
.custom-dialog-btns{display:flex;gap:10px;justify-content:center}
.custom-dialog-btns button{min-width:90px}

@media(max-width:600px){
  .hero{padding:48px 0 32px}
  .hero-kicker{font-size:11px}
  .hero h1{font-size:24px}
  .hero .subtitle{font-size:13px}
  .hero-deco{display:none}
  .wave-divider{height:32px}
  .gift-grid{grid-template-columns:1fr}
  .query-section{grid-template-columns:1fr;gap:12px}
  .query-card{padding:20px 16px}
  .query-card .label{font-size:16px;margin-bottom:12px}
  .query-card input,.query-card select{height:44px;font-size:15px}
  .points-box .pts-value{font-size:32px}
  .pts-score-label{font-size:12px}
  .gift-card{padding:10px 12px 10px 16px}
  .gift-card .gift-icon{width:38px;height:38px;font-size:18px}
  .modal{padding:24px 20px}
  .modal h3{font-size:16px}
  .fields input{height:40px;font-size:15px}
  .btn{height:38px;font-size:13px}
  .wrap{padding:0 16px}
}
</style>
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
</head>
<body>
<div class="aurora-bg"></div>
<div class="toast-rack" id="toasts"></div>
<main class="wrap">

  <div class="hero">
    <div class="hero-kicker">OST · SUMMER 2026</div>
    <h1>星辰 · 盛夏逐光 <span class="dream">Dream</span></h1>
    <div class="subtitle">积分兑换礼物商城 · 让每一份努力都被看见</div>
    <div class="hero-deco">
      <svg viewBox="0 0 120 120" fill="none">
        <path d="M10,40 Q30,20 50,40 T90,40 T130,40" stroke="var(--secondary)" stroke-width="3" fill="none" opacity=".5"/>
        <path d="M10,55 Q30,35 50,55 T90,55 T130,55" stroke="var(--primary-light)" stroke-width="3" fill="none" opacity=".4"/>
        <path d="M10,70 Q30,50 50,70 T90,70 T130,70" stroke="var(--primary)" stroke-width="3" fill="none" opacity=".3"/>
      </svg>
    </div>
  </div>

  <div class="wave-divider">
    <svg viewBox="0 0 1440 48" preserveAspectRatio="none">
      <path d="M0,24 C240,48 480,0 720,24 C960,48 1200,0 1440,24 L1440,48 L0,48 Z" fill="rgba(56,189,248,.1)" opacity="0.3"/>
      <path d="M0,32 C240,8 480,40 720,24 C960,8 1200,40 1440,24 L1440,48 L0,48 Z" fill="rgba(6,182,212,.08)" opacity="0.2"/>
    </svg>
  </div>

  <div class="query-section">
    <div class="query-card">
      <div class="label">查询积分</div>
      <div class="query-row">
        <input type="text" id="streamerInput" placeholder="输入主播昵称或姓名" autocomplete="off">
        <button class="btn btn-primary btn-small" onclick="queryStreamer()">查询积分</button>
      </div>
      <div class="points-box" id="pointsDisplay">
        <span class="pts-empty">输入主播昵称或姓名，点击查询显示积分</span>
      </div>
    </div>
    <div class="query-card">
      <div class="label">兑换礼物</div>
      <div style="margin-bottom:8px">
        <input type="text" id="rdmName" placeholder="兑换人姓名（必填）" style="width:100%;margin-bottom:8px;text-align:center">
        <select id="giftDropdown" style="width:100%;margin-bottom:8px" onchange="onGiftDropdownChange()">
          <option value="">选择礼物</option>
        </select>
        <span id="operatorSelect" class="operator-display" style="width:100%;margin-bottom:8px"></span>
        <button class="btn btn-primary" onclick="quickRedeem()" style="width:100%;margin-top:4px">确认兑换</button>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin:40px 0 24px"><span style="font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:.04em">兑换礼物</span><div style="width:40px;height:3px;background:linear-gradient(90deg,var(--primary-light),var(--secondary));margin:8px auto 0;border-radius:2px"></div></div>
  <div id="giftArea"></div>

  <div class="admin-trigger">
    <button onclick="openAdminAuth()">⚙️ 管理后台</button>
  </div>

  <div class="wave-divider" style="margin-top:20px">
    <svg viewBox="0 0 1440 48" preserveAspectRatio="none">
      <path d="M0,24 C240,0 480,48 720,24 C960,0 1200,48 1440,24 L1440,0 L0,0 Z" fill="rgba(56,189,248,.1)" opacity="0.3"/>
      <path d="M0,16 C240,40 480,8 720,24 C960,40 1200,8 1440,24 L1440,0 L0,0 Z" fill="rgba(6,182,212,.08)" opacity="0.2"/>
    </svg>
  </div>
  <footer class="site-footer">
    <p class="footer-title">星辰 · 盛夏逐光</p>
    <p class="footer-sub">积分兑换礼物商城 · 让每一份努力都被看见</p>
  </footer>
</main>

<!-- Admin Password Modal -->
<div class="modal-mask" id="adminAuthModal" style="display:none">
  <div class="modal" style="max-width:340px">
    <h3>🔐 管理后台登录</h3>
    <div class="sub">请输入管理密码</div>
    <div class="fields">
      <input type="password" id="adminPwd" placeholder="密码" onkeydown="if(event.key==='Enter')checkAdminAuth()">

var TCB_ENV='ostgift-d0gim6ky878a7cd69';
var tcbReady=false;
var tcbDb=null;
var tcb_=null;
(function initCB(){
  try{
    var app=cloudbase.init({env:TCB_ENV,region:'ap-shanghai'});
    tcbDb=app.database();
    tcb_=tcbDb.command;
    var auth=app.auth();

    console.warn('[CloudBase] Init failed:',e.message);

})();

async function loadCloudAndSync(){
  if(!tcbReady) return;
  try{
    var _a=await Promise.all([
      tcbDb.collection('gifts').get(),
      tcbDb.collection('streamers').get(),
      tcbDb.collection('records').orderBy('ts','desc').limit(500).get()
    ]);
    var gData=_a[0].data||[],sData=_a[1].data||[],rData=_a[2].data||[];
    if(gData.length>0&&sData.length>0){
      D.gifts=gData;
      D.streamers=sData;
      D.records=rData;
      save();
      console.log('[CloudBase] Loaded: '+gData.length+' gifts, '+sData.length+' streamers, '+rData.length+' records');
    }else{
      console.log('[CloudBase] Empty data, keeping local');
    }
  }catch(e){
    console.error('[CloudBase] Load error:',e);
  }
  render();
}

function setupRealtime(){
  if(!tcbReady) return;
  var timer=null;
  function debouncedSync(){
    if(timer) return;
    timer=setTimeout(function(){timer=null;loadCloudAndSync();},500);
  }
  try{
    tcbDb.collection('gifts').watch({onChange:debouncedSync,onError:function(e){console.warn('[Watch] gifts err:',e)}});
    tcbDb.collection('streamers').watch({onChange:debouncedSync,onError:function(e){console.warn('[Watch] streamers err:',e)}});
    tcbDb.collection('records').watch({onChange:debouncedSync,onError:function(e){console.warn('[Watch] records err:',e)}});
    console.log('[CloudBase] \u2713 Real-time watchers active');
  }catch(e){
    console.warn('[CloudBase] Watch not supported, using polling');
    setInterval(function(){
      if(tcbReady) loadCloudAndSync();
    },3000);
  }
}

function toast(msg,type='success'){
  const r=document.getElementById('toasts');const e=document.createElement('div');
  e.className=`toast-msg ${type}`;e.textContent=msg;r.appendChild(e);
  setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500);
}

// ===== STREAMER =====
function queryStreamer(){
  const val=document.getElementById('streamerInput').value.trim();
  if(!val){resetStreamer();toast('请输入主播昵称或姓名','error');return}
  let s=D.streamers.find(x=>x.realName===val);
  if(!s)s=D.streamers.find(x=>x.name===val);
  if(!s){const lower=val.toLowerCase();const matches=D.streamers.filter(x=>x.name.toLowerCase().includes(lower));if(matches.length===1)s=matches[0];else if(matches.length>1){toast(`找到${matches.length}个匹配，请输入更精确的名称`,'error');return}}
  if(!s){resetStreamer();toast('未找到该主播','error');return}
  curStreamer=s.id;
  curOperator=s.operator||'';
  const os=document.getElementById('operatorSelect');os.innerHTML=curOperator?'<span class="op-label">运营</span><span class="op-name">'+esc(curOperator)+'</span>':'';
  const label=s.realName?s.name+'（'+s.realName+'）':s.name;
  const rd=document.getElementById('rdmName');if(rd){rd.value=label;rd.readOnly=true;rd.style.opacity='0.7'}
  renderPoints();renderGifts();
}
function resetStreamer(){
  curStreamer=null;curOperator='';
  const os=document.getElementById('operatorSelect');if(os)os.textContent='';
  const rd=document.getElementById('rdmName');if(rd){rd.value='';rd.readOnly=false;rd.style.opacity='1'}
  renderPoints();renderGifts();
}
function renderPoints(){
  const el=document.getElementById('pointsDisplay');
  if(!curStreamer){el.innerHTML='<span class="pts-empty">输入主播昵称或姓名，点击查询显示积分</span>';return}
  const s=D.streamers.find(x=>x.id===curStreamer);if(!s){el.innerHTML='<span class="pts-empty">未找到该主播</span>';return}
  const remain=s.totalPts-s.usedPts;
  const label=s.realName?s.name+'（'+s.realName+'）':s.name;
  el.innerHTML=`<div class="pts-row"><span class="pts-label">${esc(label)}${curOperator?' · '+esc(curOperator):''}</span></div><div class="pts-row pts-score-row"><span class="pts-score-label">剩余积分</span><span class="pts-value" style="color:${remain>=100?'var(--s-gold)':remain>=65?'var(--b-silver)':remain>=45?'var(--a-bronze)':'var(--text)'}">${fmt(remain)}</span></div>`;
}

// ===== RENDER GIFTS =====
function renderGifts(){
  const area=document.getElementById('giftArea');
  if(!D.gifts.length){area.innerHTML='<div style="text-align:center;padding:48px;color:var(--text3)">暂无礼物</div>';return}

  const streamerPts = curStreamer ? (()=>{const s=D.streamers.find(x=>x.id===curStreamer);return s?s.totalPts-s.usedPts:0})() : 0;

  // Group by tier
  const tiers={s:[],b:[],a:[]};
  D.gifts.forEach(g=>{(tiers[g.tier]||tiers.a).push(g)});

  const tierOrder=['s','a','b'];
  let html='';
  tierOrder.forEach(tk=>{
    const gifts=tiers[tk];if(!gifts||!gifts.length)return;
    const t=TIERS[tk];
    const cards=gifts.map((g,idx)=>{
      const r=remain(g),sold=r<=0;
      const locked = streamerPts < g.cost;
      const cls = sold?'sold-out':(locked&&curStreamer?'sold-out':'');
      return`
      <div class="gift-card ${cls}" style="animation-delay:${idx*0.04}s">
        <div class="gift-icon">${esc(g.emoji||'🎁')}</div>
        <div class="gift-body">
          <div class="gift-name">${esc(g.name)}</div>
          <div class="gift-meta">
            <span>需 ${fmt(g.cost)} 积分</span>
          </div>
        </div>
        <div class="gift-stock${r<=g.total*.2?' low':''}">
          ${sold?'已兑完':locked&&curStreamer?'积分不足':`剩 ${r}/${g.total}`}
        </div>
      </div>`;
    }).join('');
    html+=`
    <div class="tier-section">
      <div class="tier-header">
        <span class="tier-badge ${t.badge}">${t.label}</span>
        <span style="margin:0 6px;color:var(--text2)">|</span><span class="tier-threshold">≥${t.threshold} 积分可兑换</span>
        ${curStreamer?`<span style="margin-left:auto;font-size:13px;color:${streamerPts>=t.threshold?'var(--primary-light)':'var(--text3)'}">${streamerPts>=t.threshold?'✓ 已达标':'⚠ 未达标'}</span>`:''}
      </div>
      <div class="gift-grid">${cards}</div>
    </div>`;
  });
  area.innerHTML=html;
}

function quickRedeem(){doRedeem()}
async function doRedeem(){
  var gid=document.getElementById('giftDropdown').value;
  var nm=document.getElementById('rdmName').value.trim();
  var op=document.getElementById('operatorSelect').textContent;
  if(!curStreamer){toast('\u8bf7\u5148\u67e5\u8be2\u4e3b\u64ad\u79ef\u5206','error');return}
  if(!gid){toast('\u8bf7\u9009\u62e9\u793c\u7269','error');return}
  if(!nm){toast('\u8bf7\u8f93\u5165\u5151\u6362\u4eba\u59d3\u540d','error');return}
  if(!op){toast('\u8bf7\u9009\u62e9\u8fd0\u8425','error');return}
  var g=D.gifts.find(function(x){return x.id===gid;});
  if(!g){toast('\u793c\u7269\u4e0d\u5b58\u5728','error');return}
  var s=D.streamers.find(function(x){return x.id===curStreamer;});
  if(!s){toast('\u4e3b\u64ad\u4e0d\u5b58\u5728','error');return}
  if(s.totalPts-s.usedPts<g.cost){toast('\u79ef\u5206\u4e0d\u8db3\u9700'+g.cost,'error');return}

  // Real-time CloudBase stock check
  if(tcbReady&&tcb_){
    try{
      var freshG=await tcbDb.collection('gifts').doc(g._id||g.id).get();
      var fg=freshG&&freshG.data?freshG.data:null;
      if(fg){
        var stockLeft=fg.total-fg.used;
        if(stockLeft<=0){
          toast('\u5b9e\u65f6\u5e93\u5b58\u5df2\u7a7a\uff0c\u8bf7\u5237\u65b0','error');
          return;
        }
        // Atomic increment
        var stockRes=await tcbDb.collection('gifts').doc(g._id||g.id).update({used:tcb_.inc(1)});
        if(stockRes&&stockRes.updated>0){
          await tcbDb.collection('streamers').doc(s._id||s.id).update({usedPts:tcb_.inc(g.cost)});
          var rec={giftId:g.id,giftName:g.name,streamerId:s.id,streamerName:s.name,redeemer:nm,operator:op,qty:1,ptsUsed:g.cost,ts:Date.now()};
          var addRes=await tcbDb.collection('records').add(rec);
          rec.id=addRes._id||addRes.id||uid();rec._id=rec.id;
          D.records.unshift(rec);
          g.used=fg.used+1;s.usedPts+=g.cost;
          console.log('[Redeem] CloudBase OK, stock:',g.used,'/',g.total);
          save();render();
          toast(nm+'\u5151\u6362'+g.name+'\u6210\u529f\u2601\ufe0f','success');
          return;
        }
      }
    }catch(e){
      console.warn('[Redeem] CloudBase err, fallback local:',e.message);
    }
  }
  // Local fallback
  if(remain(g)<=0){toast('\u5e93\u5b58\u4e0d\u8db3','error');return}
  g.used++;s.usedPts+=g.cost;
  var rec={id:uid(),giftId:g.id,giftName:g.name,streamerId:s.id,streamerName:s.name,redeemer:nm,operator:op,qty:1,ptsUsed:g.cost,ts:Date.now()};
  D.records.unshift(rec);
  save();render();
  toast(nm+'\u5151\u6362'+g.name+'\u6210\u529f\u672c\u5730','success');
}

function fmtTime(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`}
function renderRecords(){
  const el=document.getElementById('recordsList');
  if(!D.records||!D.records.length){el.innerHTML='<span style="color:var(--text3);font-size:13px">暂无兑换记录</span>';return}
  el.innerHTML=D.records.slice(0,50).map((r,i)=>{
    const isRollback=r.giftName&&r.giftName&&r.giftName.indexOf("回退")>=0;
    if(isRollback) return `<div class="admin-item" style="background:rgba(255,107,122,.12);border-left:3px solid #FF6B7A"><span>↩ ${esc(r.redeemer)} 回退 ${esc(r.giftName.replace('【回退】',''))}</span><span class="meta">${esc(r.streamerName)} · ${r.operator||'?'} · ${fmtTime(r.ts)}</span><span><button class="act-btn" style="color:var(--text3)" disabled>已退回</button></span></div>`
    return `<div class="admin-item"><span>${esc(r.redeemer)} 兑换 ${esc(r.giftName)} ${r.qty>1?'×'+r.qty:''}</span><span class="meta">${esc(r.streamerName)} · ${r.operator||'?'} · ${fmtTime(r.ts)}</span><span><button class="act-btn" style="color:#FF6B7A" onclick="rollbackRecord('${r.id}')">回退</button></span></div>`}).join('');
}
function rollbackRecord(id){
  try{
    var rec=D.records.find(function(r){return r.id===id||r._id===id;});
    if(!rec){toast('\u8bb0\u5f55\u4e0d\u5b58\u5728','error');return}
    if(rec.giftName&&rec.giftName.indexOf('\u56de\u9000')>=0){toast('\u5df2\u7ecf\u662f\u56de\u9000\u8bb0\u5f55','error');return}
    var nm=rec.redeemer||'\u672a\u77e5';
    var gn=rec.giftName||'\u672a\u77e5';
    showConfirm('\u56de\u9000\u300c'+nm+'\u300d\u5151\u6362\u7684\u300c'+gn+'\u300d\uff1f\n\u5c06\u6062\u590d'+rec.ptsUsed+'\u79ef\u5206\u548c'+(rec.qty||1)+'\u4ef6\u5e93\u5b58',async function(){
      if(tcbReady){
        try{
          // Reverse gift stock
          if(rec.giftId){
            await tcbDb.collection('gifts').doc(rec.giftId).update({used:tcb_.inc(-(rec.qty||1))});
            var g2=D.gifts.find(function(x){return x.id===rec.giftId||x._id===rec.giftId;});
            if(g2) g2.used=Math.max(0,g2.used-(rec.qty||1));
          }
          // Reverse points
          if(rec.streamerId){
            await tcbDb.collection('streamers').doc(rec.streamerId).update({usedPts:tcb_.inc(-rec.ptsUsed)});
            var s2=D.streamers.find(function(x){return x.id===rec.streamerId||x._id===rec.streamerId;});
            if(s2) s2.usedPts=Math.max(0,s2.usedPts-rec.ptsUsed);
          }
          // Mark as rollback
          var rbRec={giftId:rec.giftId||'',giftName:'\u3010\u56de\u9000\u3011'+rec.giftName,streamerId:rec.streamerId||'',streamerName:rec.streamerName||'',redeemer:rec.redeemer,operator:rec.operator||'',qty:-(rec.qty||1),ptsUsed:-rec.ptsUsed,ts:Date.now()};
          var rbAdd=await tcbDb.collection('records').add(rbRec);
          rbRec.id=rbAdd._id||rbAdd.id||uid();
          rbRec._id=rbRec.id;
          D.records=D.records.filter(function(r){return r.id!==id&&r._id!==id;});
          D.records.unshift(rbRec);
        }catch(e){
          toast('\u56de\u9000\u5931\u8d25:'+e.message,'error');
          return;
        }
      }else{
        if(rec.giftId){var g2=D.gifts.find(function(x){return x.id===rec.giftId;});if(g2)g2.used=Math.max(0,g2.used-(rec.qty||1));}
        if(rec.streamerId){var s2=D.streamers.find(function(x){return x.id===rec.streamerId;});if(s2)s2.usedPts=Math.max(0,s2.usedPts-rec.ptsUsed);}
        var rbRec={id:uid(),giftId:rec.giftId||'',giftName:'\u3010\u56de\u9000\u3011'+rec.giftName,streamerId:rec.streamerId||'',streamerName:rec.streamerName||'',redeemer:rec.redeemer,operator:rec.operator||'',qty:-(rec.qty||1),ptsUsed:-rec.ptsUsed,ts:Date.now()};
        D.records=D.records.filter(function(r){return r.id!==id;});
        D.records.unshift(rbRec);
      }
      save();render();renderRecords();
      toast('\u5df2\u56de\u9000\u5e76\u8fd4\u8fd8\u79ef\u5206\u5e93\u5b58');
    });
  }catch(e){toast('\u56de\u9000\u51fa\u9519:'+e.message,'error')}
}

function addGift(){
try{
  var nm=document.getElementById('gName').value.trim(),em=document.getElementById('gEmoji').value.trim();
  var q=parseInt(document.getElementById('gQty').value),tier=document.getElementById('gTier').value;
  var rawCost=parseInt(document.getElementById('gCost')&&document.getElementById('gCost').value);
  var cost=isNaN(rawCost)?(TIERS[tier]&&TIERS[tier].threshold)||100:rawCost;
  if(!nm||q<1||cost<1){toast('\u8bf7\u5b8c\u6574\u586b\u5199','error');return}
  var gid=uid();
  var g={_id:gid,id:gid,name:nm,emoji:em,total:q,used:0,cost:cost,tier:tier};
  D.gifts.push(g);
  if(tcbReady){tcbDb.collection('gifts').add(g).then(function(r){g._id=r._id||r.id||gid;}).catch(function(e){console.error('Cloud add gift err',e)})}
  save();render();renderAdminLists();toast('\u5df2\u6dfb\u52a0 '+nm);
  document.getElementById('gName').value='';document.getElementById('gEmoji').value='';document.getElementById('gQty').value='';
  var ce=document.getElementById('gCost');if(ce)ce.value='';
}catch(e){toast('addGift\u51fa\u9519:'+e.message,'error');console.error('addGift',e);}
}

  document.getElementById('giftAddRow').innerHTML=`

    <input class="tiny" id="egEmoji" placeholder="图标" value="${esc(g.emoji)}" maxlength="4">
    <input class="narrow" id="egCost" type="number" placeholder="所需积分" value="${g.cost}" min="1">
    <input class="narrow" id="egQty" type="number" placeholder="库存数量" value="${g.total}" min="${g.used}">
    <select class="mid" id="egTier" style="height:36px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;padding:0 8px">

function saveGift(id){
  try{
    var g=D.gifts.find(function(x){return x.id===id||x._id===id;});if(!g)return;
    var nEl=document.getElementById('egName'),eEl=document.getElementById('egEmoji'),qEl=document.getElementById('egQty'),tEl=document.getElementById('egTier'),cEl=document.getElementById('egCost');
    if(!nEl||!qEl||!tEl){toast('\u8868\u5355\u5f02\u5e38\uff0c\u8bf7\u5237\u65b0\u91cd\u8bd5','error');return}
    g.name=nEl.value.trim();
    g.emoji=eEl?eEl.value.trim():'';
    var newQ=parseInt(qEl.value);if(isNaN(newQ)||newQ<1)return;
    g.total=newQ;
    g.tier=tEl.value;
    var rawC=parseInt(cEl&&cEl.value);g.cost=isNaN(rawC)?g.cost:rawC;
    if(g.total<g.used){toast('\u4e0d\u80fd\u5c0f\u4e8e\u5df2\u5151('+g.used+')','error');return}
    if(!g.name){toast('\u8bf7\u5b8c\u6574\u586b\u5199','error');return}
    var docId=g._id||g.id;
    if(tcbReady){tcbDb.collection('gifts').doc(docId).update({name:g.name,emoji:g.emoji,total:g.total,tier:g.tier,cost:g.cost}).catch(function(e){console.error('Cloud update gift err',e)})}
    save();cancelGiftEdit();render();renderAdminLists();toast('\u5df2\u4fdd\u5b58');
  }catch(e){toast('\u4fdd\u5b58\u51fa\u9519:'+e.message,'error');console.error(e)}
}

      <option value="s">S级别奖励 ≥100分</option><option value="a">A级奖励 ≥65分</option><option value="b">B级奖励 ≥45分</option>
    </select>
    <button class="btn btn-primary btn-small" onclick="addGift()">+ 添加</button>`;
}

function delGift(id){
  try{
    var g=D.gifts.find(function(x){return x.id===id||x._id===id;});
    if(!g){toast('\u793c\u7269\u4e0d\u5b58\u5728','error');return}
    if(g.used>0){toast('\u6709\u5151\u6362\u8bb0\u5f55\uff0c\u65e0\u6cd5\u5220\u9664','error');return}
    showConfirm('\u5220\u9664\u300c'+g.name+'\u300d\uff1f',function(){
      D.gifts=D.gifts.filter(function(x){return x.id!==id&&x._id!==id;});
      if(tcbReady){tcbDb.collection('gifts').doc(g._id||g.id).remove().catch(function(e){console.error('Cloud del gift err',e)})}
      save();render();renderAdminLists();toast('\u5df2\u5220\u9664');
    });
  }catch(e){toast('\u5220\u9664\u51fa\u9519:'+e.message,'error')}
}

function addStreamer(){
  var nm=document.getElementById('sName').value.trim(),rn=(document.getElementById('sRealName')||{}).value&&document.getElementById('sRealName').value.trim()||'';
  var p=parseInt(document.getElementById('sPts').value),op=(document.getElementById('sOperator')||{}).value||'';
  if(!nm||isNaN(p)||p<0){toast('\u8bf7\u5b8c\u6574\u586b\u5199','error');return}
  var sid=uid();
  var s={_id:sid,id:sid,name:nm,realName:rn,operator:op,totalPts:p,usedPts:0};
  D.streamers.push(s);
  if(tcbReady){tcbDb.collection('streamers').add(s).then(function(r){s._id=r._id||r.id||sid;}).catch(function(e){console.error('Cloud add streamer err',e)})}
  save();render();toast('\u5df2\u6dfb\u52a0 '+nm);
  document.getElementById('sName').value='';if(document.getElementById('sRealName'))document.getElementById('sRealName').value='';document.getElementById('sPts').value='';
}

function editStr(id){
  var s=D.streamers.find(function(x){return x.id===id||x._id===id;});if(!s)return;
  var nm2=null,rn2=null,op2=null,tp2=null;
  showPrompt('\u6635\u79f0',s.name,function(v){
    if(!v)return;nm2=v;
    showPrompt('\u5b9e\u540d\uff08\u9009\u586b\uff09',s.realName||'',function(v){
      rn2=v||'';
      showPrompt('\u8fd0\u8425',s.operator||'',function(v){
        op2=v||'';
        showPrompt('\u7d2f\u8ba1\u79ef\u5206',String(s.totalPts),function(v){
          var tp=parseInt(v);if(isNaN(tp)||tp<0)return;tp2=tp;
          showPrompt('\u5df2\u4f7f\u7528\u79ef\u5206',String(s.usedPts),function(v){
            var up=parseInt(v);if(isNaN(up)||up<0||up>tp2)return;
            s.name=nm2;s.realName=rn2;s.operator=op2;s.totalPts=tp2;s.usedPts=up;
            var docId=s._id||s.id;
            if(tcbReady){tcbDb.collection('streamers').doc(docId).update({name:s.name,realName:s.realName,operator:s.operator,totalPts:s.totalPts,usedPts:s.usedPts}).catch(function(e){console.error('Cloud update streamer err',e)})}
            save();render();
          });
        });
      });
    });
  });
}

function delStr(id){
  if(D.records&&D.records.some(function(r){return r.streamerId===id;})){toast('\u6709\u5151\u6362\u8bb0\u5f55','error');return}
  showConfirm('\u786e\u5b9a\u5220\u9664\uff1f',function(){
    var s=D.streamers.find(function(x){return x.id===id||x._id===id;});
    D.streamers=D.streamers.filter(function(x){return x.id!==id&&x._id!==id;});
    if(tcbReady&&s){tcbDb.collection('streamers').doc(s._id||s.id).remove().catch(function(e){console.error('Cloud del streamer err',e)})}
    if(curStreamer===id){curStreamer=null;curOperator='';document.getElementById('streamerInput').value='';document.getElementById('operatorSelect').textContent=''}
    save();render();
  });
}

function exportData(){
  const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`star-gift-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(a.href);toast('已导出');
}

function importData(e){
  const f=e.target.files[0];if(!f)return;
  new FileReader().addEventListener('load',ev=>{
    try{const d=JSON.parse(ev.target.result);if(!d.gifts||!d.streamers)throw 0;
    showConfirm('导入覆盖当前数据？',function(){
      D=d;save();curStreamer=null;curOperator='';document.getElementById('streamerInput').value='';document.getElementById('operatorSelect').textContent='';render();toast('已导入');
    })}catch(x){toast('格式错误','error')}
  }).readAsText(f);e.target.value='';
}

function resetAll(){
  showConfirm('\u91cd\u7f6e\u6e05\u7a7a\u6240\u6709\u6570\u636e\uff1f',function(){
    D=JSON.parse(JSON.stringify(DEF));
    if(tcbReady){
      // Clear CloudBase collections
      var cleanGifts=function(items){return items.map(function(g){var ng={name:g.name,emoji:g.emoji,total:g.total,used:0,cost:g.cost,tier:g.tier};return ng;});};
      var cleanStreamers=function(items){return items.map(function(s){var ns={name:s.name,realName:s.realName,operator:s.operator,totalPts:s.totalPts,usedPts:0};return ns;});};
      // Delete all and re-insert (bulk not supported, so we do best effort)
      Promise.all([
        tcbDb.collection('gifts').get().then(function(r){(r.data||[]).forEach(function(d){tcbDb.collection('gifts').doc(d._id).remove().catch(function(){})})}),
        tcbDb.collection('streamers').get().then(function(r){(r.data||[]).forEach(function(d){tcbDb.collection('streamers').doc(d._id).remove().catch(function(){})})}),
        tcbDb.collection('records').get().then(function(r){(r.data||[]).forEach(function(d){tcbDb.collection('records').doc(d._id).remove().catch(function(){})})})
      ]).then(function(){
        // Re-insert DEF data
        setTimeout(function(){
          D.gifts.forEach(function(g){tcbDb.collection('gifts').add({name:g.name,emoji:g.emoji,total:g.total,used:0,cost:g.cost,tier:g.tier}).catch(function(){})});
          D.streamers.forEach(function(s){tcbDb.collection('streamers').add({name:s.name,realName:s.realName,operator:s.operator,totalPts:s.totalPts,usedPts:0}).catch(function(){})});
        },1000);
      });
    }
    save();curStreamer=null;curOperator='';document.getElementById('streamerInput').value='';document.getElementById('operatorSelect').textContent='';render();
  });
}


function render(){
  renderPoints();renderGifts();populateGiftDropdown();
}
render();
</script>
